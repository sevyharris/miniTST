{% set version = "0.1.0" %}

package:
  name: minitst
  version: {{ version }}

source:
  # When publishing to conda-forge / anaconda.org, replace with:
  # url: https://github.com/<your-org>/minitst/archive/v{{ version }}.tar.gz
  # sha256: <hash>
  path: .

build:
  number: 0
  noarch: python
  script: "{{ PYTHON }} -m pip install . --no-deps -vv"

requirements:
  host:
    - python >=3.7
    - pip
    - setuptools
  run:
    - python >=3.7
    - numpy
    - ase
    - rdkit

test:
  imports:
    - minitst
    - minitst.geometry
    - minitst.species
  requires:
    - pytest
  source_files:
    - tests/
  commands:
    - pytest tests/ -v

about:
  home: https://github.com/<your-org>/minitst
  license: MIT
  license_file: LICENSE
  summary: >
    3-D molecule geometry and conformer handling extracted from AutoTST.
    Provides Species and Conformer classes backed by RDKit, ASE, and RMG.
